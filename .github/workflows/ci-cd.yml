# CI/CD pipeline (README architecture):
#   Stage 1: pytest            <- quality gate #1
#   Stage 2: build + Trivy     <- quality gate #2 (DevSecOps)
#   Stage 3: push image, tag = git SHA (immutable, traceable artifact)
#   Stage 4: helm upgrade      <- zero-downtime rolling deployment
#
# Required repo secrets:
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN     (Phase 3)
#   KUBE_CONFIG (base64-encoded kubeconfig) (Phase 4 — deploy job is skipped until set)

name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE: supriyaswa/devops-capstone

jobs:
  test:
    name: Stage 1 — Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install -r app/requirements-dev.txt

      - name: Lint
        run: flake8 app --max-line-length=100

      - name: Run pytest
        run: |
          cd app
          python -m pytest -v

  build-scan-push:
    name: Stage 2+3 — Build, Scan & Push
    needs: test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Verify workspace
        shell: bash
        run: |
          set -euxo pipefail

          pwd
          ls -la

          echo "IMAGE=${IMAGE}"
          echo "SHA=${{ github.sha }}"

          test -f Dockerfile

      - name: Build Docker image
        shell: bash
        run: |
          set -euxo pipefail

          docker build \
            --progress=plain \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: supriyaswa
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        shell: bash
        run: |
          set -euxo pipefail

          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

  deploy:
    name: Stage 4 — Helm Deploy
    needs: build-scan-push
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euxo pipefail

          if [ -z "${KUBE_CONFIG}" ]; then
            echo "KUBE_CONFIG secret not configured."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p ~/.kube
          echo "${KUBE_CONFIG}" | base64 -d > ~/.kube/config

      - name: Install Helm
        if: env.SKIP_DEPLOY != 'true'
        uses: azure/setup-helm@v4

      - name: Helm Upgrade
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          set -euxo pipefail

          helm upgrade --install flask-app ./helm/flask-app \
            --namespace demo \
            --create-namespace \
            --wait \
            --timeout 3m \
            --set image.repository=${IMAGE} \
            --set image.tag=${{ github.sha }}

      - name: Verify rollout
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          kubectl rollout status deployment/flask-app \
            -n demo \
            --timeout=120s